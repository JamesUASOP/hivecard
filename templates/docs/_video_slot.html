{% macro video_slot(key, videos) %}
{% set entry = videos.get(key, {}) %}
{% set title = entry.get('title') or 'Instructional video' %}
{% set embed = entry.get('embed_url', '') %}
<div class="video-slot{% if not embed %} video-slot--empty{% endif %}">
  <div class="video-slot-label">{{ title }}</div>
  {% if embed %}
  <div class="video-embed">
    <iframe src="{{ embed }}" title="{{ title }}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen loading="lazy"></iframe>
  </div>
  {% else %}
  <div class="video-slot-placeholder">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><polygon points="5 3 19 12 5 21 5 3"/></svg>
    <span>Video coming soon</span>
  </div>
  {% endif %}
</div>
{% endmacro %}
