# HiveCard hotspot DNS — installed to /etc/NetworkManager/dnsmasq-shared.d/hivecard.conf
# Friendly hostname for the web GUI (port 80 on the AP is redirected to hivecard-web).
address=/hivecard/10.42.0.1
address=/hivecard.local/10.42.0.1
local=/hivecard/
domain=hivecard
expand-hosts

# Mobile captive-portal probes → AP gateway (triggers sign-in notification).
address=/connectivitycheck.gstatic.com/10.42.0.1
address=/clients3.google.com/10.42.0.1
address=/captive.apple.com/10.42.0.1
address=/www.apple.com/10.42.0.1
address=/msftconnecttest.com/10.42.0.1
address=/www.msftconnecttest.com/10.42.0.1
address=/detectportal.firefox.com/10.42.0.1
address=/nmcheck.gnome.org/10.42.0.1

# DHCP captive-portal URI (RFC 7710) where supported by the client OS.
dhcp-option=114,http://hivecard/login
